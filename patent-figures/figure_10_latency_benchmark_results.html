<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Figure latency_benchmark_results</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .mermaid {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            font-size: 16px;
        }
        /* Force consistent formal line thicknesses where Mermaid misses them */
        .mermaid .node rect, .mermaid .node circle, .mermaid .node ellipse, .mermaid .node polygon {
            stroke-width: 2px !important;
        }
        .html-table-wrapper table {
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 25px 0;
            font-size: 18px;
            min-width: 400px;
            box-shadow: none;
            border: 2px solid #000;
        }
        .html-table-wrapper th, .html-table-wrapper td {
            padding: 15px 20px;
            border: 2px solid #000;
            text-align: center;
        }
        .html-table-wrapper th {
            background-color: #fff;
            color: #000;
            font-weight: bold;
            border-bottom: 2px solid #000;
        }
        .html-table-wrapper tbody td.bold-row {
            font-weight: bold;
            border-right: 2px solid #000;
        }
        .html-table-wrapper h2 {
            text-align: center;
            color: #000;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="html-table-wrapper">
<h2>Fig 10. Latency Benchmark Results (ms)</h2>
<table>
    <thead>
        <tr>
            <th>Cognitive Load State</th>
            <th>BASELINE Latency</th>
            <th>CLADS Latency (Reduced)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="bold-row">LOW CLS State</td>
            <td style="border-style: dashed;">119 ms</td>
            <td>91 ms</td>
        </tr>
        <tr>
            <td class="bold-row">MEDIUM CLS State</td>
            <td style="border-style: dashed;">145 ms</td>
            <td>105 ms</td>
        </tr>
        <tr>
            <td class="bold-row">HIGH CLS State</td>
            <td style="border-style: dashed;">120 ms</td>
            <td style="border-width: 4px; font-weight: bold;">68.6 ms (42.8% Improvement)</td>
        </tr>
    </tbody>
</table>
    </div>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ 
          startOnLoad: true, 
          theme: 'base',
          themeVariables: {
              primaryColor: '#ffffff',
              primaryTextColor: '#000000',
              primaryBorderColor: '#000000',
              lineColor: '#000000',
              secondaryColor: '#ffffff',
              tertiaryColor: '#ffffff',
              background: '#ffffff',
              noteBkgColor: '#ffffff',
              noteBorderColor: '#000000',
              noteTextColor: '#000000',
              actorBkg: '#ffffff',
              actorBorder: '#000000',
              actorTextColor: '#000000',
              signalColor: '#000000',
              signalTextColor: '#000000'
          },
          flowchart: {
              htmlLabels: true,
              curve: 'basis'
          },
          sequence: {
              actorMargin: 50
          }
      });
    </script>
</body>
</html>
